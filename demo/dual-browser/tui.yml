# lazytui demo — dual-pane file manager (multi-instance showcase).
#
# Two `files` panes open at once, navigated independently, both opening
# into one shared Detail preview — the classic two-pane file manager
# (Midnight Commander / ranger / Total Commander), built from lazytui's
# multi-instance Components (v0.6.4 Theme A).
#
# This config browses the lazytui repo itself: the left pane roots at
# the source tree (js/), the right at the docs (docs/). Navigate each
# independently — move the cursor in one, the other stays put; filter (/)
# one, the other is unaffected — and press Enter on any file to open it
# in the shared preview on the right.
#
# Generalize it to your own project by repointing the two roots, e.g.
#   src/ + test/      — implementation beside its tests
#   frontend/ + backend/   — a monorepo's two halves
#   config/ + examples/    — config beside sample usage
# For a richer pattern, one pane can be `source: docker` (a container
# filesystem) beside a `source: filesystem` pane on your repo — compare
# your config files against what's actually live in the container.
#
# Run:
#   cd demo/dual-browser && ./run        # or: ./run --list  (headless)
#   node js/app/tui.js demo/dual-browser/tui.yml   # equivalent, from repo root
#
# This same config is the fixture driven by the smoke scenario
# js/test/smoke/multi-instance.js — keep them in sync.

# Browse the repo root (this file lives at demo/dual-browser/).
project_dir: ../..
theme: monokai

# Mouse gesture → intent overrides (v0.6.4 Theme F). Parallel to `keys:`.
# These four lines are the BUILT-IN DEFAULTS, shown here as a worked
# example — deleting the whole block changes nothing. Bind a gesture to a
# different intent to remap it (e.g. `right-click: activate` to open the
# selected file on right-click), or to `noop` to disable it.
#   intents: activate (run/open the row) · context (menu at cursor) · noop
mouse:
  double-click: activate     # double-click a row → open it (Enter-equivalent)
  right-click:  context      # right-click → context menu at the cursor
  middle-click: noop         # reserved — inert today
  double-click-ms: 250       # same-cell double-click window, in milliseconds

# Extra right-click context-menu entries (v0.6.4 Theme F follow-on). Parallel
# to `keys:` / `mouse:`: a list of rows appended to the right-click menu, after
# the built-in Copy / Refresh / Help. Each row names ONE verb form —
#   action:  a configured action's short key (here `grep`; runs via the same
#            path as a leader `action:` binding — opens its `$1` prompt)
#   builtin: a built-in verb (e.g. show_help, refresh)
#   command: a `:`-cmdline command string
# An optional `pane:` (a kind or a list of kinds) gates the row to that pane;
# omit it to show everywhere (incl. empty space). Delete the block to remove
# the extra rows — the built-in menu is unaffected.
context-menu:
  - label: git grep in repo…   # → opens the grep action's prompt
    action: grep
    pane: files                # only on a files pane (the two browsers)
  - label: Help
    builtin: show_help         # everywhere, incl. empty space
  # - label: Reload listing    # command form (a `:`-cmdline command):
  #   command: show-hidden     #   uncomment + name a command your config registers

groups:
  browse:
    label: Dual browser
    containers: []
    actions:
      grep:
        label: git grep in repo
        desc: |
          Search the repo for a string with `git grep -n`. Streams hits
          into the Detail preview.
        type: run
        tab: true
        script: git grep -n "$1"

panels:
  src:
    type: files
    title: Source (js/)
    source: filesystem
    root: js
  docs:
    type: files
    title: Docs (docs/)
    source: filesystem
    root: docs
  detail:
    type: detail
    title: Preview

layout:
  columns:
    - width: 34
      panels:
        - src
    - width: 34
      panels:
        - docs
    - panels:
        - { tabs: [detail], height: 60% }
